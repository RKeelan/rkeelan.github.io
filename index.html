<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <title>Richard Keelan</title>

    <link rel="stylesheet" href="stylesheets/styles.css">
    <link rel="stylesheet" href="stylesheets/pygment_trac.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>Richard Keelan</h1>
        <p>Interested in AI, markets broadly construed, and close-to-the-metal programming.</p>
        <p class="badge-row">
          <a class="social-badge github-badge" href="https://github.com/RKeelan">GitHub</a>
          <a class="social-badge linkedin-badge" href="https://www.linkedin.com/in/richard-keelan-79793611/">LinkedIn</a>
        </p>
      </header>
      <section>
        <h2>Published Sites</h2>
        <p id="pages-sites-status">Loading published sites…</p>
        <ul id="pages-sites-list" class="pages-sites-list"></ul>
        <noscript>
          <p>This section needs JavaScript to load the current list of published sites.</p>
        </noscript>
      </section>
    </div>
    <script src="javascripts/scale.fix.js"></script>
    <script>
      (function () {
        const status = document.getElementById("pages-sites-status");
        const list = document.getElementById("pages-sites-list");

        function setStatus(message) {
          status.textContent = message;
        }

        function renderSite(site) {
          const item = document.createElement("li");

          const siteLink = document.createElement("a");
          siteLink.href = site.site_url;
          siteLink.textContent = site.name;

          const repoLink = document.createElement("a");
          repoLink.href = site.repo_url;
          repoLink.textContent = "Repository";
          repoLink.className = "repo-link";

          const title = document.createElement("p");
          title.className = "site-title";
          title.appendChild(siteLink);
          title.appendChild(document.createTextNode(" "));
          title.appendChild(repoLink);

          const description = document.createElement("p");
          description.className = "site-description";
          description.textContent = site.description || "No description provided.";

          const url = document.createElement("p");
          url.className = "site-url";
          url.textContent = site.site_url;

          item.appendChild(title);
          item.appendChild(description);
          item.appendChild(url);
          return item;
        }

        fetch("data/pages-sites.json")
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Failed to load site data.");
            }
            return response.json();
          })
          .then(function (data) {
            list.innerHTML = "";

            if (!data.sites || data.sites.length === 0) {
              setStatus("No published GitHub Pages repositories found.");
              return;
            }

            data.sites.forEach(function (site) {
              list.appendChild(renderSite(site));
            });

            if (data.generated_at) {
              const updated = new Date(data.generated_at);
              setStatus("Last updated: " + updated.toLocaleString());
            } else {
              setStatus("Published GitHub Pages repositories.");
            }
          })
          .catch(function () {
            setStatus("Unable to load the published sites list right now.");
          });
      }());
    </script>
  </body>
</html>
