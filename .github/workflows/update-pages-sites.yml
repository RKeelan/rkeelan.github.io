name: Update Pages Sites

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update-pages-sites:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Refresh Pages sites data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: RKeelan
        run: python3 scripts/update_pages_sites.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/pages-sites.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pages-sites.json
          git commit -m "Update Pages sites data"
          git push
